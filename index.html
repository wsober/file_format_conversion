<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 转图片工具 - 本地测试版</title>
    <!-- 引入 PDF.js 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // 设置 PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <!-- 引入 JSZip 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* ==================== 全局样式 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* ==================== 头部区域 ==================== */
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* ==================== 上传区域 ==================== */
        .upload-section {
            padding: 40px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            position: relative;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        .upload-area.drag-over {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.3rem;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .upload-hint {
            color: #6c757d;
            font-size: 0.95rem;
        }

        .file-input {
            display: none;
        }

        /* ==================== 设置选项 ==================== */
        .settings-section {
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .setting-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-label {
            font-weight: 600;
            color: #495057;
        }

        .setting-select {
            padding: 8px 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .setting-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .scale-slider {
            width: 150px;
            cursor: pointer;
        }

        /* ==================== 进度条 ==================== */
        .progress-section {
            padding: 20px 30px;
            background: #fff3cd;
            border-bottom: 1px solid #ffc107;
            display: none;
        }

        .progress-section.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: #856404;
            font-weight: 600;
        }

        /* ==================== 错误提示 ==================== */
        .error-message {
            padding: 15px 20px;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            margin: 20px 30px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* ==================== 图片展示区 ==================== */
        .images-section {
            padding: 40px 30px;
            background: white;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-title {
            font-size: 1.8rem;
            color: #333;
            font-weight: 700;
        }

        .batch-download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .batch-download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .batch-download-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .image-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .image-info {
            padding: 15px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-number {
            font-weight: 600;
            color: #667eea;
            font-size: 1rem;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: scale(1.05);
        }

        /* ==================== 空状态 ==================== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #6c757d;
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 1.2rem;
        }

        /* ==================== 成功提示 ==================== */
        .success-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #d4edda;
            color: #155724;
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid #c3e6cb;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .success-toast.show {
            transform: translateX(0);
        }

        /* ==================== 响应式设计 ==================== */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .upload-area {
                padding: 40px 20px;
            }

            .upload-icon {
                font-size: 3rem;
            }

            .upload-text {
                font-size: 1.1rem;
            }

            .images-grid {
                grid-template-columns: 1fr;
            }

            .image-wrapper {
                height: 300px;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .batch-download-btn {
                width: 100%;
                justify-content: center;
            }

            .settings-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }

        /* ==================== 加载动画 ==================== */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>📄 PDF 转图片工具（本地测试）</h1>
            <p class="subtitle">将 PDF 文件转换为高质量 PNG/JPG 图片 - 纯前端版本</p>
        </header>

        <!-- 上传区域 -->
        <section class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">点击或拖拽上传 PDF 文件</div>
                <div class="upload-hint">支持 PDF 格式，最大 50MB（纯前端处理，不上传服务器）</div>
                <input type="file" class="file-input" id="fileInput" accept=".pdf,application/pdf">
            </div>
        </section>

        <!-- 设置选项 -->
        <section class="settings-section">
            <div class="setting-group">
                <label class="setting-label">输出格式:</label>
                <select class="setting-select" id="formatSelect">
                    <option value="png">PNG（推荐）</option>
                    <option value="jpeg">JPG</option>
                </select>
            </div>
            <div class="setting-group">
                <label class="setting-label">图片尺寸:</label>
                <input type="range" class="scale-slider" id="scaleSlider" 
                       min="1" max="3" step="0.5" value="2">
                <span id="scaleValue">2x</span>
            </div>
            <div class="setting-group">
                <label class="setting-label">JPG 质量:</label>
                <select class="setting-select" id="qualitySelect">
                    <option value="0.8">高（80%）</option>
                    <option value="0.9">最高（90%）</option>
                    <option value="0.7">中（70%）</option>
                    <option value="0.6">低（60%）</option>
                </select>
            </div>
        </section>

        <!-- 进度条 -->
        <section class="progress-section" id="progressSection">
            <div class="progress-text" id="progressText">正在转换：0 / 0 页</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </section>

        <!-- 错误提示 -->
        <div class="error-message" id="errorMessage"></div>

        <!-- 图片展示区 -->
        <section class="images-section">
            <div class="section-header">
                <h2 class="section-title" id="sectionTitle">转换结果</h2>
                <button class="batch-download-btn" id="batchDownloadBtn" disabled>
                    <span>📦</span>
                    <span id="batchDownloadText">批量下载全部图片</span>
                </button>
            </div>
            
            <div class="images-grid" id="imagesGrid">
                <!-- 空状态 -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">🖼️</div>
                    <div class="empty-text">请上传 PDF 文件开始转换</div>
                </div>
            </div>
        </section>
    </div>

    <!-- 成功提示 -->
    <div class="success-toast" id="successToast">
        ✅ 转换完成！共 <span id="successCount">0</span> 张图片
    </div>

    <script>
        // ==================== 全局变量 ====================
        let convertedImages = []; // 存储转换后的图片数据
        let pdfFileName = ''; // PDF 文件名

        // ==================== DOM 元素 ====================
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const formatSelect = document.getElementById('formatSelect');
        const scaleSlider = document.getElementById('scaleSlider');
        const scaleValue = document.getElementById('scaleValue');
        const qualitySelect = document.getElementById('qualitySelect');
        const progressSection = document.getElementById('progressSection');
        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');
        const errorMessage = document.getElementById('errorMessage');
        const imagesGrid = document.getElementById('imagesGrid');
        const emptyState = document.getElementById('emptyState');
        const batchDownloadBtn = document.getElementById('batchDownloadBtn');
        const batchDownloadText = document.getElementById('batchDownloadText');
        const successToast = document.getElementById('successToast');
        const successCount = document.getElementById('successCount');
        const sectionTitle = document.getElementById('sectionTitle');

        // ==================== 事件监听 ====================
        
        // 更新缩放值显示
        scaleSlider.addEventListener('input', () => {
            scaleValue.textContent = `${scaleSlider.value}x`;
        });

        // 点击上传区域
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // 批量下载
        batchDownloadBtn.addEventListener('click', downloadAllImages);

        // ==================== 核心功能函数 ====================

        /**
         * 处理上传的文件
         */
        async function handleFile(file) {
            // 重置状态
            hideError();
            convertedImages = [];
            
            // 验证文件类型
            if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
                showError('❌ 请上传有效的 PDF 文件！');
                return;
            }

            // 验证文件大小（50MB）
            if (file.size > 50 * 1024 * 1024) {
                showError('❌ 文件大小不能超过 50MB！');
                return;
            }

            pdfFileName = file.name.replace('.pdf', '');
            
            // 显示进度
            showProgress(0, 0);
            
            try {
                // 读取 PDF 文件
                const arrayBuffer = await readFileAsArrayBuffer(file);
                
                // 加载 PDF 文档
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                
                const totalPages = pdf.numPages;
                showProgress(0, totalPages);

                // 清空图片网格
                imagesGrid.innerHTML = '';
                
                // 逐页转换
                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    await convertPageToImage(pdf, pageNum, totalPages);
                }

                // 转换完成
                hideProgress();
                showSuccess(totalPages);
                updateSectionTitle(totalPages);
                enableBatchDownload(totalPages);

            } catch (error) {
                console.error('PDF 转换失败:', error);
                showError(`❌ 转换失败：${error.message}`);
                hideProgress();
            }
        }

        /**
         * 将文件读取为 ArrayBuffer
         */
        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        /**
         * 将 PDF 页面转换为图片
         */
        async function convertPageToImage(pdf, pageNum, totalPages) {
            const page = await pdf.getPage(pageNum);
            const scale = parseFloat(scaleSlider.value);
            
            // 获取视口
            const viewport = page.getViewport({ scale });
            
            // 创建 canvas
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            // 渲染 PDF 页面到 canvas
            await page.render({
                canvasContext: context,
                viewport: viewport
            }).promise;

            // 获取输出格式和质量
            const format = formatSelect.value;
            const quality = parseFloat(qualitySelect.value);
            
            // 转换为图片数据
            const imageDataUrl = canvas.toDataURL(
                format === 'png' ? 'image/png' : 'image/jpeg', 
                quality
            );

            // 保存图片数据
            convertedImages.push({
                pageNum,
                dataUrl: imageDataUrl,
                format: format
            });

            // 创建并添加图片卡片
            addImageCard(imageDataUrl, pageNum, totalPages);
            
            // 更新进度
            updateProgress(pageNum, totalPages);
        }

        /**
         * 添加图片卡片到网格
         */
        function addImageCard(imageDataUrl, pageNum, totalPages) {
            const card = document.createElement('div');
            card.className = 'image-card';
            
            card.innerHTML = `
                <div class="image-wrapper">
                    <img src="${imageDataUrl}" alt="第 ${pageNum} 页">
                </div>
                <div class="image-info">
                    <span class="page-number">第 ${pageNum} 页</span>
                    <button class="download-btn" onclick="downloadSingleImage(${pageNum - 1})">
                        ⬇️ 下载
                    </button>
                </div>
            `;
            
            imagesGrid.appendChild(card);
        }

        /**
         * 下载单张图片
         */
        function downloadSingleImage(index) {
            if (index >= 0 && index < convertedImages.length) {
                const image = convertedImages[index];
                const link = document.createElement('a');
                link.href = image.dataUrl;
                link.download = `${pdfFileName}_page_${String(image.pageNum).padStart(3, '0')}.${image.format}`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        /**
         * 批量下载所有图片（ZIP 打包）
         */
        async function downloadAllImages() {
            if (convertedImages.length === 0) return;

            // 禁用按钮防止重复点击
            batchDownloadBtn.disabled = true;
            batchDownloadText.innerHTML = '<span class="loading-spinner"></span> 打包中...';

            try {
                const zip = new JSZip();
                
                // 将所有图片添加到 ZIP
                convertedImages.forEach((image, index) => {
                    const base64Data = image.dataUrl.split(',')[1];
                    const fileName = `${pdfFileName}_page_${String(image.pageNum).padStart(3, '0')}.${image.format}`;
                    zip.file(fileName, base64Data, { base64: true });
                });

                // 生成并下载 ZIP
                const content = await zip.generateAsync({ type: 'blob' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${pdfFileName}_images.zip`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);

                // 恢复按钮状态
                batchDownloadBtn.disabled = false;
                batchDownloadText.textContent = '批量下载全部图片';

            } catch (error) {
                console.error('打包下载失败:', error);
                showError('❌ 打包下载失败，请重试');
                batchDownloadBtn.disabled = false;
                batchDownloadText.textContent = '批量下载全部图片';
            }
        }

        // ==================== UI 辅助函数 ====================

        /**
         * 显示进度条
         */
        function showProgress(current, total) {
            progressSection.classList.add('show');
            progressText.textContent = `正在转换：${current} / ${total} 页`;
            progressFill.style.width = '0%';
        }

        /**
         * 更新进度
         */
        function updateProgress(current, total) {
            progressText.textContent = `正在转换：${current} / ${total} 页`;
            const percentage = (current / total) * 100;
            progressFill.style.width = `${percentage}%`;
        }

        /**
         * 隐藏进度条
         */
        function hideProgress() {
            setTimeout(() => {
                progressSection.classList.remove('show');
            }, 500);
        }

        /**
         * 显示错误信息
         */
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            
            // 5 秒后自动隐藏
            setTimeout(() => {
                hideError();
            }, 5000);
        }

        /**
         * 隐藏错误信息
         */
        function hideError() {
            errorMessage.classList.remove('show');
        }

        /**
         * 显示成功提示
         */
        function showSuccess(count) {
            successCount.textContent = count;
            successToast.classList.add('show');
            
            // 3 秒后自动隐藏
            setTimeout(() => {
                successToast.classList.remove('show');
            }, 3000);
        }

        /**
         * 更新章节标题
         */
        function updateSectionTitle(count) {
            sectionTitle.textContent = `转换结果（共 ${count} 张）`;
        }

        /**
         * 启用批量下载按钮
         */
        function enableBatchDownload(count) {
            batchDownloadBtn.disabled = false;
            batchDownloadText.textContent = `批量下载全部图片（${count}张）`;
        }

        /**
         * 禁用批量下载按钮
         */
        function disableBatchDownload() {
            batchDownloadBtn.disabled = true;
            batchDownloadText.textContent = '批量下载全部图片';
        }
    </script>
</body>
</html>
